<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>Test</h1>
    <script type="text/javascript" src="index2.js"></script>
    <script type="text/javascript" src="index.js"></script>
    <h1>Numbers ADD</h1>
    <div class="card w-50 m-2 p-2">
      <div>
        <input
          id="text1"
          type="number"
          class="form-control mb-1"
          placeholder="Input Number 1"
        />
        <input
          id="text2"
          type="number"
          class="form-control"
          placeholder="Input Number 2"
        />
        <h1 class="d-flex justify-content-center" id="display-1">Bandara</h1>
        <h1 class="d-flex justify-content-center" id="display-3"></h1>
        <div class="d-flex justify-content-center">
          <button onclick="addNumbers()" class="btn btn-primary">Click</button>
        </div>
      </div>
    </div>
    <h1>Equal</h1>
    <div class="card w-50 m-2 p-2">
      <div>
        <input
          id="text3"
          type="text"
          class="form-control mb-1"
          placeholder="Input Text 1"
        />
        <input
          id="text4"
          type="text"
          class="form-control"
          placeholder="Input Text 2"
        />
        <h1 class="d-flex justify-content-center" id="display-2">Bandara</h1>
        <div class="d-flex justify-content-center">
          <button onclick="equal()" class="btn btn-primary">Click</button>
        </div>
      </div>
    </div>
    <h1>Numbers+</h1>
    <div class="card w-50 m-2 p-2">
      <div>
        <input
          id="textAll"
          type="text"
          class="form-control mb-1"
          placeholder="Input Numbers"
        />

        <h1 class="d-flex justify-content-center" id="display-4"></h1>
        <div class="d-flex justify-content-center">
          <button onclick="addAllNumbers()" class="btn btn-primary">
            Click
          </button>
        </div>
      </div>
    </div>
    <h1>Grade</h1>
    <div class="card w-50 m-2 p-2">
      <div>
        <input
          id="marks"
          type="number"
          class="form-control mb-1"
          placeholder="Enter Marks"
        />

        <h1 class="d-flex justify-content-center" id="display-5"></h1>
        <div class="d-flex justify-content-center">
          <button onclick="grade()" class="btn btn-primary">Check Gread</button>
        </div>
      </div>
    </div>

    <h1>Input name</h1>
    <div class="card w-50 m-2 p-2">
      <div>
        <input
          id="input-name"
          type="text"
          class="form-control mb-1"
          placeholder="Input Short Name"
        />

        <h1 class="d-flex justify-content-center" id="display-6"></h1>
        <div class="d-flex justify-content-center">
          <button onclick="inputName()" class="btn btn-primary">
            Check Input
          </button>
        </div>
      </div>
    </div>

    <h1>Login</h1>
    <div class="card w-50 m-2 p-2">
      <div>
        <input
          id="username"
          type="text"
          class="form-control mb-1"
          placeholder="Username"
        />
        <input
          id="password"
          type="text"
          class="form-control mb-1"
          placeholder="Password"
        />
        <h1 class="d-flex justify-content-center" id="display-7"></h1>
        <div class="d-flex justify-content-center">
          <button onclick="login()" class="btn btn-primary">Login</button>
        </div>
      </div>
    </div>

    <h1>Random Numbers</h1>
    <div class="card w-50 m-2 p-2">
      <div>
        <input
          id="random"
          type="number"
          class="form-control mb-1"
          placeholder="Username"
        />
        <input
          id="password"
          type="text"
          class="form-control mb-1"
          placeholder="Password"
        />
        <h1 class="d-flex justify-content-center" id="display-random"></h1>
        <div class="d-flex justify-content-center">
          <button onclick="random()" class="btn btn-primary">Random</button>
        </div>
      </div>
    </div>
  </body>
</html>
