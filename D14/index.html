<!doctype html>
<html lang="en">
  <head>

  <body>
    <h1>Jquery</h1>

    <div
      class="view"
      style="background-color: blue; width: 100px; height: 100px; margin: 10px"
    ></div>
    <br />
    <button id="click-show" type="button" class="btn btn-primary">
      Primary
    </button>
    <button id="click-hide" type="button" class="btn btn-secondary">
      Secondary
    </button>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item profile">
          <a class="nav-link profile" aria-current="page" href="#">Profile</a>
        </li>
        <li class="nav-item about">
          <a class="nav-link about" aria-current="page" href="#">About</a>
          </a>
        </li>
        <li class="nav-item contact">
          <a class="nav-link contact" aria-current="page" href="#">Contact</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>

<div id="home">

</div>

</div>
